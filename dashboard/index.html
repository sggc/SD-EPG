<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD-EPG 电子节目指南</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header" id="app-header">
        <div class="header-content">
            <a href="../" class="logo" title="返回首页">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span>SD-EPG</span>
            </a>
            <button class="hamburger-btn" id="hamburger-btn" onclick="App.toggleNav()" title="菜单">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <nav class="nav" id="main-nav" onclick="App.closeNav()">
                <a href="#/" class="nav-link" data-route="/">首页</a>
                <a href="#/channels" class="nav-link" data-route="/channels">频道列表</a>
                <a href="#/details" class="nav-link" data-route="/details">详细信息</a>
                <a href="#/config" class="nav-link" data-route="/config" id="nav-config">配置管理</a>
                <a href="#/database" class="nav-link" data-route="/database">数据库</a>
                <a href="#/logs" class="nav-link" data-route="/logs">日志</a>
            </nav>
            <div class="header-right">
                <button class="theme-toggle" id="theme-toggle-btn" title="切换主题">
                    <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <div class="user-section" id="user-section">
                    <button class="btn btn-primary btn-sm" id="login-btn" onclick="App.showLoginModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        登录
                    </button>
                    <div class="user-menu" id="user-menu" style="display:none">
                        <button class="user-btn" id="user-btn" onclick="document.getElementById('user-dropdown').classList.toggle('show')">
                            <img id="user-avatar" class="avatar" src="" alt="">
                            <span class="username" id="user-name-display"></span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="dropdown" id="user-dropdown">
                            <a id="user-github-link" href="#" target="_blank" class="dropdown-item">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                GitHub 主页
                            </a>
                            <button class="dropdown-item" onclick="App.logout()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                                退出登录
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="nav-backdrop" id="nav-backdrop" onclick="App.closeNav()"></div>

    <main id="app-content">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <span class="loading-text">加载中...</span>
        </div>
    </main>

    <div class="modal-overlay" id="login-modal" style="display:none" onclick="if(event.target===this)App.closeLoginModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title">登录</h3>
                <button class="modal-close" onclick="App.closeLoginModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label">GitHub Token</label>
                    <input type="password" class="input-field" id="token-input" placeholder="请输入 GitHub Personal Access Token" onkeydown="if(event.key==='Enter')App.doLogin()"/>
                </div>
                <div class="error-message" id="login-error" style="display:none"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="App.closeLoginModal()">取消</button>
                <button class="btn btn-primary" onclick="App.doLogin()">登录</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
