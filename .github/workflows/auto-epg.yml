name: EPG Aggregation

on:
  schedule:
    # 北京时间 03:20 → UTC 19:20
    - cron: '20 19 * * *'
    # 北京时间 04:50 → UTC 20:50
    - cron: '50 20 * * *'
    # 北京时间 10:20 → UTC 02:20
    - cron: '20 2 * * *'
    # 北京时间 16:20 → UTC 08:20
    - cron: '20 8 * * *'
  workflow_dispatch:
    inputs:
      run_aggregation:
        description: '运行 EPG 聚合'
        required: true
        default: true
        type: boolean
      run_desc_injection:
        description: '运行 Desc 注入'
        required: true
        default: true
        type: boolean

jobs:
  aggregate-epg:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout public repository (SD-EPG)
      uses: actions/checkout@v4
      with:
        path: public_repo
    
    - name: Checkout private repository (SDU-IPTV-NEW)
      uses: actions/checkout@v4
      with:
        repository: sggc/SDU-IPTV-NEW
        path: private_repo
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests lxml beautifulsoup4
    
    - name: Configure git
      run: |
        cd public_repo
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
    
    # ========== 第一步：聚合EPG ==========
    - name: Run EPG aggregation script
      if: ${{ github.event_name == 'schedule' || github.event.inputs.run_aggregation == 'true' }}
      run: |
        cd public_repo
        python ../private_repo/scripts/aggregate_epg.py \
          --config ../private_repo/config/epg_config.json \
          --output-dir ./EPG \
          --log-dir ./log
    
    # ========== 第二步：提交聚合结果 ==========
    - name: Commit aggregated EPG
      if: ${{ github.event_name == 'schedule' || github.event.inputs.run_aggregation == 'true' }}
      run: |
        cd public_repo
        git add EPG/sggc.xml.gz log/aggregation_log.txt
        
        if git diff --staged --quiet; then
          echo "No changes to aggregated EPG"
        else
          git commit -m "EPG聚合 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
    
    # ========== 第三步：注入Desc ==========
    - name: Inject Desc to EPG
      if: ${{ github.event_name == 'schedule' || github.event.inputs.run_desc_injection == 'true' }}
      run: |
        cd public_repo
        python ../private_repo/scripts/add_desc.py \
          --input ./EPG/sggc.xml.gz \
          --desc-db-url "https://raw.githubusercontent.com/sggc/SD-EPG/refs/heads/main/database/desc_database.json,https://raw.githubusercontent.com/sggc/SD-EPG/refs/heads/main/database/apidb.json" \
          --man-made-url "https://raw.githubusercontent.com/sggc/SD-EPG/refs/heads/main/database/man-made.json" \
          --output ./EPG/sggc-desc.xml.gz \
          --log ./log/desc_match_log.txt
      continue-on-error: true
    
    # ========== 第四步：提交带Desc的EPG ==========
    - name: Commit EPG with Desc
      if: ${{ github.event_name == 'schedule' || github.event.inputs.run_desc_injection == 'true' }}
      run: |
        cd public_repo
        git add EPG/sggc-desc.xml.gz log/desc_match_log.txt 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "No desc changes"
        else
          git commit -m "EPG+Desc $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
