name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy all static files to deploy directory
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp 404.html deploy/
          cp -r EPG deploy/epg
          cp -r m3u deploy/m3u
          cp -r epg-parser deploy/epg-parser

      - name: List deploy output
        run: ls -la deploy/ && ls -la deploy/epg/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4