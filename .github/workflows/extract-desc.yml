name: Extract EPG Desc

on:
  schedule:
    - cron: '35 19 * * *'  # UTC 19:35 = 北京时间 03:35
  workflow_dispatch:

jobs:
  extract-desc:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Run extract script
      run: |
        python scripts/extract_desc.py \
          --config config/desc_config.json \
          --output database/desc_database.json \
          --log-dir log
    
    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add database/desc_database.json log/desc_database_log.txt
        
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "更新Desc数据库 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git push
        fi
