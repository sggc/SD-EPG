name: TVMAO & SDGD EPG

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      run_tvmao:
        description: '运行 TVMAO 抓取'
        required: true
        default: true
        type: boolean
      run_sdgd:
        description: '运行 SDGD 抓取'
        required: true
        default: true
        type: boolean

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.ref }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          pip install requests beautifulsoup4 lxml
        fi
        
    - name: Run TVMAO EPG Crawler
      if: ${{ github.event_name == 'schedule' || github.event.inputs.run_tvmao == 'true' }}
      run: |
        python scripts/tvmao_epg_crawler.py --output EPG --log-dir log

    - name: Run SDGD EPG Crawler
      if: ${{ github.event_name == 'schedule' || github.event.inputs.run_sdgd == 'true' }}
      env:
        SDGD_TOKEN: ${{ secrets.SDGD_TOKEN }}
        SDGD_APP_ID: ${{ secrets.SDGD_APP_ID }}
      run: |
        python scripts/fetch_epg_sdgd.py
        
    - name: Display results
      run: |
        echo "生成的文件:"
        ls -lh EPG/
        echo ""
        echo "文件内容预览:"
        if [ -f "EPG/tvmao.xml" ]; then
          echo "=== tvmao.xml (前30行) ==="
          head -n 30 EPG/tvmao.xml
        fi
        if [ -f "EPG/sdgd.xml.gz" ]; then
          echo "=== sdgd.xml.gz (解压后前30行) ==="
          zcat EPG/sdgd.xml.gz | head -n 30
        fi
        
    - name: Upload EPG files
      uses: actions/upload-artifact@v4
      with:
        name: epg-files
        path: EPG/
        retention-days: 7
        if-no-files-found: warn
        
    - name: Commit and push EPG files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add EPG/tvmao.xml EPG/tvmao.xml.gz EPG/sdgd.xml.gz log/tvmao.txt

        if ! git diff --cached --quiet; then
          git commit -m "Update EPG data (tvmao + sdgd) [skip ci]"
          git fetch origin ${{ github.ref_name }}
          if ! git rebase origin/${{ github.ref_name }} -X theirs; then
            echo "::warning::Rebase failed, falling back to reset+recommit"
            git rebase --abort
            git reset --soft origin/${{ github.ref_name }}
            git add EPG/tvmao.xml EPG/tvmao.xml.gz EPG/sdgd.xml.gz log/tvmao.txt
            git commit -m "Update EPG data (tvmao + sdgd) [skip ci]"
          fi
          git push
          echo "EPG 文件已成功提交并推送"
        else
          echo "无 EPG 文件变更，跳过提交和推送"
        fi