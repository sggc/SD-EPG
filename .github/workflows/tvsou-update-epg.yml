name: TVSOU EPG

on:
  schedule:
    # 北京时间1:00 (UTC 17:00)
    - cron: '0 17 * * *'
  
  workflow_dispatch:  # 允许手动触发

jobs:
  update-epg:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run EPG crawler
        run: |
          python scripts/tvsou_epg.py
      
      - name: Commit EPG files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EPG/tvsou.xml EPG/tvsou.xml.gz
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update EPG $(date '+%Y-%m-%d %H:%M:%S')"
            git fetch origin ${{ github.ref_name }}
            if ! git rebase origin/${{ github.ref_name }} -X theirs; then
              echo "::warning::Rebase failed, falling back to reset+recommit"
              git rebase --abort
              git reset --soft origin/${{ github.ref_name }}
              git add EPG/tvsou.xml EPG/tvsou.xml.gz
              git commit -m "Update EPG $(date '+%Y-%m-%d %H:%M:%S')"
            fi
            git push
          fi
