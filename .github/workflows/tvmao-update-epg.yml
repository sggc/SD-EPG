name: TVMAO EPG

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.ref }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          pip install requests beautifulsoup4 lxml
        fi
        
    - name: Run EPG Crawler
      run: |
        python scripts/tvmao_epg_crawler.py --province 370000 --output EPG --log-dir log
        
    - name: Display results
      run: |
        echo "生成的文件:"
        ls -lh EPG/
        echo ""
        echo "文件内容预览 (前50行):"
        if [ -f "EPG/tvmao.xml" ]; then
          head -n 50 EPG/tvmao.xml
        else
          echo "警告：tvmao.xml 文件未生成"
        fi
        
    - name: Upload EPG files
      uses: actions/upload-artifact@v4
      with:
        name: epg-files
        path: EPG/
        retention-days: 7
        if-no-files-found: warn
        
    - name: Commit and push EPG files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git stash push -u -m "Temporarily stash EPG files" || true
        
        git pull --rebase --allow-unrelated-histories -X ours origin ${{ github.ref_name }}
        
        git stash pop || true
        
        git add EPG/tvmao.xml EPG/tvmao.xml.gz log/tvmao.txt
        
        if ! git diff --cached --quiet; then
          git commit -m "Update EPG data [skip ci]"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          echo "EPG 文件已成功提交并推送"
        else
          echo "无 EPG 文件变更，跳过提交和推送"
        fi
