name: Generate False EPG

on:
  schedule:
    # 每天凌晨1点运行 (UTC时间17:00，北京时间01:00)
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: '强制重新生成'
        required: false
        default: false
        type: boolean

jobs:
  generate-false-epg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Configure git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Generate False EPG
      run: |
        python scripts/generate_false_epg.py \
          --channels-file ./config/false_epg_channels.json \
          --output-dir ./EPG \
          --log-file ./log/false_epg_log.json

    - name: Commit and Push
      run: |
        git add EPG/false.xml.gz log/false_epg_log.json

        if git diff --staged --quiet; then
          echo "No changes to false EPG"
        else
          git commit -m "生成虚假EPG $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          git fetch origin ${{ github.ref_name }}
          if ! git rebase origin/${{ github.ref_name }} -X theirs; then
            echo "::warning::Rebase failed, falling back to reset+recommit"
            git rebase --abort
            git reset --soft origin/${{ github.ref_name }}
            git add EPG/false.xml.gz log/false_epg_log.json
            git commit -m "生成虚假EPG $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          fi
          git push
        fi
