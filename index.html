<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時光轨車的IPTV指南</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-glow: rgba(37, 99, 235, 0.15);
            --secondary: #7c3aed;
            --secondary-glow: rgba(124, 58, 237, 0.15);
            --success: #16a34a;
            --success-glow: rgba(22, 163, 74, 0.15);
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --text: #0f172a;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --border: #e2e8f0;
            --radius: 16px;
            --radius-sm: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px -8px rgba(0, 0, 0, 0.1), 0 8px 16px -6px rgba(0, 0, 0, 0.06);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% 0%, var(--primary-glow) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 100% 100%, var(--secondary-glow) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 2.5rem 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card-epg::before { background: linear-gradient(90deg, var(--primary), var(--secondary)); }
        .card-m3u::before { background: linear-gradient(90deg, var(--success), #14b8a6); }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: transparent;
        }

        .card:hover::before { opacity: 1; }

        .card-icon {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            font-size: 2rem;
            transition: transform 0.3s;
        }

        .card:hover .card-icon {
            transform: scale(1.1);
        }

        .card-epg .card-icon {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(124, 58, 237, 0.1));
        }

        .card-m3u .card-icon {
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.1), rgba(20, 184, 166, 0.1));
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .card p {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .card-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tag {
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .tag-epg {
            background: rgba(37, 99, 235, 0.08);
            color: var(--primary);
        }

        .tag-m3u {
            background: rgba(22, 163, 74, 0.08);
            color: var(--success);
        }

        .footer {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .cards { grid-template-columns: 1fr; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="logo-dot"></span>
            IPTV GUIDE
        </div>
        <h1>時光轨車的IPTV指南</h1>
        <p class="subtitle">汇聚 EPG 数据管理与 M3U 频道编辑的一站式平台</p>

        <div class="cards">
            <a href="dashboard/" class="card card-epg">
                <div class="card-icon">📺</div>
                <h2>EPG 电子节目指南</h2>
                <p>实时 EPG 数据聚合与管理，频道节目一览无余</p>
                <div class="card-tags">
                    <span class="tag tag-epg">EPG</span>
                    <span class="tag tag-epg">数据聚合</span>
                    <span class="tag tag-epg">频道管理</span>
                </div>
            </a>
            <a href="m3u/" class="card card-m3u">
                <div class="card-icon">🔄</div>
                <h2>多功能频道管理工具</h2>
                <p>M3U 频道列表转换、编辑、排序与 Logo 匹配</p>
                <div class="card-tags">
                    <span class="tag tag-m3u">M3U</span>
                    <span class="tag tag-m3u">格式转换</span>
                    <span class="tag tag-m3u">频道编辑</span>
                </div>
            </a>
        </div>

        <p class="footer">
            Powered by <a href="https://github.com/sggc/SD-EPG" target="_blank" rel="noopener">SD-EPG</a>
        </p>
    </div>
</body>
</html>
