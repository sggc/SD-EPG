<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        (function(l) {
            var path = l.pathname;
            var base = '/SD-EPG';
            var epgBase = base + '/epg/';
            var m3uBase = base + '/m3u/';
            var epgParserBase = base + '/epg-parser/';

            if (path.startsWith(epgBase)) {
                var rest = path.slice(epgBase.length);
                if (rest) {
                    l.replace(epgBase + '?' + rest + l.hash);
                } else {
                    l.replace(epgBase);
                }
            } else if (path.startsWith(m3uBase)) {
                l.replace(m3uBase + l.hash);
            } else if (path.startsWith(epgParserBase)) {
                l.replace(epgParserBase + l.hash);
            } else {
                l.replace(base + '/');
            }
        }(window.location));
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
